<div class="lrn-qe-edit-form">
  <script>
    (function() {
      let graffiticodeWindow = null;
      const LANG = '0166';
      let lastProcessedMessageId = null;
      let currentGcItemId = null;

      // --- Shared helpers ---

      function isLocal() {
        const h = window.location.hostname;
        return h === 'localhost' || h === '127.0.0.1';
      }

      function graffiticodeOrigin() {
        return isLocal() ? 'http://localhost:3000' : 'https://graffiticode.org';
      }

      function parseDataValue(raw) {
        if (!raw) return null;
        if (typeof raw === 'object') return raw;
        try { return JSON.parse(raw); } catch (e) { return null; }
      }

      // --- Learnosity Question Editor API ---
      // The editor exposes: init, reset, getMetadata, getJson, setJson, safeToUnload

      function findQuestionEditor() {
        if (window.questionEditorApp) return window.questionEditorApp;
        try {
          if (window.parent && window.parent !== window && window.parent.authorApp) {
            const widget = window.parent.authorApp.getWidget();
            if (widget && widget.questionEditorApp) return widget.questionEditorApp();
          }
        } catch (e) {}
        if (window.LearnosityQuestionEditor) return window.LearnosityQuestionEditor;
        for (let i = 0; i < window.frames.length; i++) {
          try {
            if (window.frames[i].questionEditorApp) return window.frames[i].questionEditorApp;
          } catch (e) {}
        }
        return null;
      }

      // Read the current question data from the editor API
      function getQuestionData() {
        try {
          const editor = findQuestionEditor();
          if (editor) return editor.getJson();
        } catch (e) {}
        return null;
      }

      // Update the question data and trigger a preview refresh.
      // The "data" attribute is type "string" in the editor schema,
      // so Learnosity expects a JSON string, not an object.
      function updateLearnosityQuestion(newData) {
        const editor = findQuestionEditor();
        if (!editor) return false;
        try {
          const q = editor.getJson();
          q.data = typeof newData === 'string' ? newData : JSON.stringify(newData);
          editor.setJson(q);
          return true;
        } catch (e) {
          console.warn('updateLearnosityQuestion() failed', e);
          return false;
        }
      }

      // --- Button text ---

      function updateButtonText() {
        const button = document.getElementById('editQuestionBtn');
        if (!button) return;
        let hasItemId = !!currentGcItemId;
        if (!hasItemId) {
          const q = getQuestionData();
          if (q && q.data) {
            const parsed = parseDataValue(q.data);
            hasItemId = parsed && !!parsed.gcItemId;
          }
        }
        button.textContent = hasItemId ? 'Edit Spreadsheet \u2192' : 'Create Spreadsheet \u2192';
      }

      // Restore gcItemId from Learnosity API on load
      setTimeout(function() {
        const q = getQuestionData();
        if (q && q.data) {
          const parsed = parseDataValue(q.data);
          if (parsed && parsed.gcItemId) {
            currentGcItemId = parsed.gcItemId;
          }
        }
        updateButtonText();
      }, 100);

      // --- Graffiticode message handling ---

      function handleDataUpdate(eventData) {
        if (!eventData.data && !eventData.itemId) return;
        if (eventData.itemId) currentGcItemId = eventData.itemId;

        let currentData = {};
        const q = getQuestionData();
        if (q && q.data) {
          currentData = parseDataValue(q.data) || {};
        }
        if (eventData.data) {
          currentData = { ...currentData, ...eventData.data };
        }
        if (eventData.itemId) {
          currentData.gcItemId = eventData.itemId;
        }

        updateLearnosityQuestion(currentData.data);
        updateButtonText();
      }

      function isAllowedOrigin(origin) {
        if (origin === 'http://localhost:3000') return true;
        try {
          const hostname = new URL(origin).hostname;
          return hostname === 'graffiticode.org' || hostname.endsWith('.graffiticode.org');
        } catch (e) {
          return false;
        }
      }

      function handleGraffiticodeMessage(event) {
        if (!isAllowedOrigin(event.origin)) return;

        const messageId = event.data?.itemId || null;
        const messageType = event.data?.type;
        const dedupKey = messageType + ':' + messageId;
        if (messageId && lastProcessedMessageId === dedupKey) return;
        if (messageId) lastProcessedMessageId = dedupKey;

        if (messageType === 'item-created') {
          currentGcItemId = event.data.itemId;
          updateLearnosityQuestion({
            validation: { points: 0, ranges: {}, cells: {} },
            interaction: { type: 'table', v: '0.0.1', cells: {}, columns: {} }
          });
          updateButtonText();
        } else if (messageType === 'data-updated' || messageType === 'item-updated') {
          handleDataUpdate(event.data);
        }
      }

      window.addEventListener('message', handleGraffiticodeMessage);

      // Send ready message to Graffiticode if this page was opened by it
      setTimeout(() => {
        if (window.opener) {
          window.opener.postMessage({ type: 'learnosity-ready' }, graffiticodeOrigin());
        }
      }, 1000);

      // --- Button click handler ---

      function attachButtonHandler() {
        const editBtn = document.getElementById('editQuestionBtn');
        if (!editBtn) {
          setTimeout(attachButtonHandler, 500);
          return;
        }
        editBtn.addEventListener('click', function() {
          lastProcessedMessageId = null;

          // Determine gcItemId from API or local tracking
          let gcItemId = currentGcItemId || null;
          if (!gcItemId) {
            const q = getQuestionData();
            if (q && q.data) {
              const parsed = parseDataValue(q.data);
              gcItemId = parsed && parsed.gcItemId || null;
            }
          }

          const messageOrigin = window.location.origin;
          const params = new URLSearchParams({
            lang: LANG,
            mode: 'editor',
            origin: messageOrigin,
            editorMode: 'true',
            editorOrigin: messageOrigin
          });

          if (gcItemId) params.append('itemId', gcItemId);

          try {
            if (window.parent && window.parent !== window && window.parent.location) {
              params.append('parentOrigin', window.parent.location.origin);
            }
          } catch (e) {}

          const baseUrl = graffiticodeOrigin() + '/editor';
          const fullUrl = baseUrl + '?' + params.toString();

          if (graffiticodeWindow && !graffiticodeWindow.closed) {
            graffiticodeWindow.location.href = fullUrl;
            graffiticodeWindow.focus();
          } else {
            graffiticodeWindow = window.open(fullUrl, 'graffiticode-editor', 'width=1200,height=800');
          }

          if (!graffiticodeWindow) {
            alert('Unable to open Graffiticode Console. Please check your popup blocker settings.');
            return;
          }

          window.graffiticodeWindow = graffiticodeWindow;
          try {
            if (window.parent && window.parent !== window) {
              window.parent.graffiticodeWindow = graffiticodeWindow;
            }
          } catch (e) {}

          // Poll until Graffiticode acknowledges communication
          let communicationEstablished = false;
          const handleReady = (event) => {
            if (event.data?.type === 'graffiticode-ready') {
              communicationEstablished = true;
              clearInterval(checkLoaded);
              window.removeEventListener('message', handleReady);
            }
          };
          window.addEventListener('message', handleReady);

          const target = graffiticodeOrigin();
          const checkLoaded = setInterval(() => {
            if (communicationEstablished) { clearInterval(checkLoaded); return; }
            try {
              graffiticodeWindow.postMessage(
                { type: 'establish-communication', origin: messageOrigin },
                target
              );
            } catch (e) {}
          }, 1000);

          setTimeout(() => {
            clearInterval(checkLoaded);
            window.removeEventListener('message', handleReady);
          }, 60000);
        });
      }

      attachButtonHandler();
    })();
  </script>
  <style>
    /* Hide the Spreadsheet data section using screen-reader accessible technique */
    /* This keeps the element programmatically accessible but visually hidden */
    .lrn-qe-row-flex:has([data-lrn-qe-label="data"]) {
        position: absolute !important;
        width: 1px !important;
        height: 1px !important;
        padding: 0 !important;
        margin: -1px !important;
        overflow: hidden !important;
        clip: rect(0, 0, 0, 0) !important;
        white-space: nowrap !important;
        border: 0 !important;
    }

    /* Fallback for browsers that don't support :has() selector */
    /* Target the last row flex which contains the data field */
    .lrn-qe-row-flex:last-child {
        position: absolute !important;
        width: 1px !important;
        height: 1px !important;
        padding: 0 !important;
        margin: -1px !important;
        overflow: hidden !important;
        clip: rect(0, 0, 0, 0) !important;
        white-space: nowrap !important;
        border: 0 !important;
    }

    /* Ensure the data input and label remain accessible but hidden */
    [data-lrn-qe-label="data"],
    [data-lrn-qe-input="data"] {
        /* Using clip-path for modern browsers while maintaining accessibility */
        clip-path: inset(50%) !important;
        position: absolute !important;
        width: 1px !important;
        height: 1px !important;
        overflow: hidden !important;
        white-space: nowrap !important;
    }
  </style>
